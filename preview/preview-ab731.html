L'AB-731 n'est pas une certification pour développeurs. Elle cible les **décideurs** qui pilotent l'adoption de l'IA dans leur organisation. Contrairement à l'AB-730 (AI Business Professional), elle vise à comprendre *quand*, *pourquoi* et *avec quel outil* utiliser l'IA.

Voici les grands piliers qu'elle structure dans la tête.

---

## 1. Comprendre les types d'IA et ce qu'est (vraiment) l'IA générative

Le tout premier réflexe que la certification installe : **distinguer les familles d'IA**.

- **IA générative** : crée du contenu *nouveau et original* (texte, images, code, audio) en apprenant des motifs statistiques.
- **IA prédictive** : analyse des données historiques pour *prévoir* (ex. prévision de la demande, churn client).
- **IA descriptive / prescriptive** : analyse et recommande.

La nuance centrale revient sans cesse : générer ≠ prévoir ≠ classifier. Prévoir les ventes du prochain trimestre, c'est de la prédictive. Rédiger une description produit, c'est de la générative. Cette grille de lecture est la base de presque toutes les questions de cas pratique.

---

## 2. Le vocabulaire fondamental de l'IA générative

La certification s'assure qu'on maîtrise un socle de concepts clés :

| Concept | Ce qu'il faut retenir |
| --- | --- |
| **Grounding (ancrage)** | Ancrer les réponses dans des sources de données *vérifiées* de l'entreprise pour réduire les hallucinations. N'« garantit » jamais une exactitude à 100 %. |
| **RAG** (Retrieval Augmented Generation) | Connecte un LLM à une base de connaissances externe *au moment de la requête*, **sans réentraînement**. Idéal pour des données propriétaires fréquemment mises à jour. |
| **Prompt engineering** | Concevoir des instructions claires, contextuelles, avec exemples. Agit à l'inférence, *pas* sur l'entraînement du modèle. |
| **Pré-entraîné vs. fine-tuné** | Le pré-entraîné apprend du langage général. Le fine-tuné est adapté à un domaine précis. |
| **Hallucination** | Sortie réaliste mais factuellement fausse (l'examen parle parfois de « model inaccuracy »). |
| **Tokens** | L'unité de facturation des modèles. Les tokens de sortie coûtent plus cher que ceux d'entrée. |

---

## 3. Le catalogue d'outils Microsoft (le cœur de l'examen)

Une **part énorme** des questions consiste à choisir le bon outil pour le bon cas d'usage. C'est sans doute l'apport le plus concret de la certification.

### Plateformes de développement

- **Microsoft Foundry** : plateforme unifiée *pour développeurs et data professionals* pour construire, personnaliser, évaluer et gouverner des solutions IA de bout en bout. Nécessite un abonnement Azure (pas une licence Copilot).
- **Azure Machine Learning** : entraîner des modèles *prédictifs* sur données historiques (prévision de demande, churn) via AutoML.

### Services Azure AI (savoir les départager est crucial)

- **Azure Document Intelligence** : extraire des données structurées de formulaires/factures (OCR + structuration JSON).
- **Azure Vision** : analyse d'images, détection de défauts, OCR sur labels. ⚠️ Ne permet **pas** de *générer* des images : c'est de l'analyse, pas de la génération.
- **Azure Language** : sentiment, NER (personnes/lieux/entreprises), détection et masquage de PII, traduction, résumé.
- **Azure Speech** : transcription et analyse d'enregistrements audio.
- **Azure AI Search** : recherche sémantique/vectorielle sur de grands corpus, knowledge mining.

### Écosystème Copilot

- **Microsoft 365 Copilot** : assistant intégré aux apps M365 (Word, Excel, Outlook...), s'appuie sur **Microsoft Graph** (emails, fichiers, réunions, chats du tenant). Hérite des politiques de sécurité existantes.
- **Microsoft Copilot Studio** : créer des **agents conversationnels personnalisés** low-code (ex. bot RH), connectés aux données métier.
- **Microsoft 365 Copilot connectors** (via Microsoft Graph) : indexer des sources de données externes / LOB.
- Agents intégrés : **Analyst** (insights sur données structurées) et **Researcher** (raisonnement multi-étapes sur web + données org).

### Construire, acheter ou étendre ?

Un réflexe de décision que la certification ancre fortement :

- **Acheter (buy)** : adopter une solution prête à l'emploi comme Microsoft 365 Copilot. Le plus rapide à déployer quand le besoin est couvert par les capacités natives.
- **Étendre (extend)** : enrichir Copilot via le Microsoft 365 Copilot extensibility framework (agents Copilot Studio, connecteurs Graph vers des sources LOB). Quand on veut brancher ses données métier sans repartir de zéro.
- **Construire (build)** : développer une solution sur mesure avec Microsoft Foundry. Réservé aux cas où aucune brique existante ne répond au besoin.

> **Pour un profil décideur, cette grille est précieuse : elle évite le réflexe « on développe tout » et oriente vers l'option la moins coûteuse et la plus rapide à délivrer de la valeur.**

---

## 4. Le modèle économique (FinOps de l'IA)

La certification veille à ce qu'on comprenne **comment l'IA est facturée** et comment optimiser les coûts :

- Facturation **au token** (entrée + sortie).
- **Standard (On-Demand)** : pay-as-you-go, idéal pour un PoC qui démarre petit.
- **Provisioned (PTUs)** : débit réservé.
- **Batch API** : -50 % sur les tokens, gros volumes non urgents (cible de traitement sous 24 h).

Leviers d'optimisation : **changer pour un modèle plus petit** + **optimiser les prompts** (réduire les tokens), plutôt que du fine-tuning coûteux.

---

## 5. L'IA responsable (Responsible AI) — un pilier transversal

C'est l'un des apports les plus marquants. La certification ancre les **6 principes Microsoft de l'IA responsable** :

1. **Fairness (équité)** : éviter les biais (ex. rejeter tous les candidats > 60 ans = violation).
2. **Reliability & Safety (fiabilité et sécurité)**.
3. **Privacy & Security (confidentialité)** : anonymisation, moindre privilège, protection des PII.
4. **Inclusiveness (inclusivité)** : accessible à toutes les capacités.
5. **Transparency (transparence)** : expliquer les décisions (ex. justifier un refus de prêt).
6. **Accountability (responsabilité)** : l'humain reste l'autorité finale. Pas de décision 100 % autonome.

Les filtres de contenu, les disclaimers ("vous parlez à une IA") et les tests de fairness reviennent comme bonnes pratiques.

---

## 6. Gouvernance et adoption de l'IA en entreprise

Un volet stratégique et organisationnel :

- **Conseil de gouvernance de l'IA (AI council)** : organe transverse (légal, direction, métiers) qui aligne l'IA sur la stratégie, assure l'oversight responsable et coordonne. *Pas* de l'opérationnel quotidien.
- **Barrières à l'adoption** : manque de confiance, données de mauvaise qualité (souvent citée comme l'une des principales causes d'échec des projets IA), approche « techno d'abord », silos.
- **Programme de champions** : pairs qui évangélisent, partagent des prompts et identifient les cas d'usage. Meilleur levier pour passer à l'échelle.
- **Gouvernance des données** : classification, contrôle d'accès, Microsoft Purview, moindre privilège (Zero Trust).

---

## Ma conclusion

La certification AB-731 ne fait pas de vous un ingénieur IA. Elle vous donne **quatre compétences clés** pour piloter l'IA dans une organisation :

1. **Cadrer un besoin** : choisir entre IA générative, prédictive ou un service cognitif spécialisé.
2. **Mapper le bon outil Microsoft** sur chaque cas d'usage métier (c'est environ 40 % de l'enjeu).
3. **Raisonner coût et licences** : tokens, modèles de pricing, licences Copilot add-on.
4. **Déployer de façon responsable et gouvernée** : 6 principes RAI, conseil de gouvernance, adoption.

> **L'AB-731 forme le « traducteur » entre les capacités de l'IA Microsoft et les besoins réels du business. Un profil de plus en plus recherché.**

<script>
const INITIAL_MDX = document.getElementById('initial-mdx').textContent.trim();

const textarea = document.getElementById('mdx');
const preview = document.getElementById('preview');
const stats = document.getElementById('stats');

textarea.value = INITIAL_MDX;

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, s => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[s]));
}

function formatDateFr(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    return d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
  } catch { return iso; }
}

function render() {
  const raw = textarea.value;
  const match = raw.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
  let frontmatter = {};
  let body = raw;
  if (match) {
    try { frontmatter = jsyaml.load(match[1]) || {}; } catch (e) { frontmatter = {}; }
    body = match[2];
  }

  const title = frontmatter.title || 'Sans titre';
  const excerpt = frontmatter.excerpt || '';
  const category = Array.isArray(frontmatter.category)
    ? frontmatter.category.join(' · ')
    : (frontmatter.category || '');
  const date = formatDateFr(frontmatter.date);

  const bodyHtml = marked.parse(body);

  preview.innerHTML = `
    ${category ? `<div class="meta">${escapeHtml(category)}</div>` : ''}
    <h1>${escapeHtml(title)}</h1>
    ${excerpt ? `<div class="excerpt">${escapeHtml(excerpt)}</div>` : ''}
    ${date ? `<div class="date">${escapeHtml(date)}</div>` : ''}
    ${bodyHtml}
  `;

  const words = body.replace(/[#*_>`\-|]/g, ' ').split(/\s+/).filter(w => w.length > 1).length;
  const readTime = Math.ceil(words / 300);
  stats.textContent = `Mots: ${words} • Temps: ${readTime} min`;
}

let debounce;
textarea.addEventListener('input', () => {
  clearTimeout(debounce);
  debounce = setTimeout(render, 150);
});

function copyMdx(e) {
  textarea.select();
  document.execCommand('copy');
  const btn = e.currentTarget;
  const orig = btn.textContent;
  btn.textContent = '✓ Copié !';
  setTimeout(() => btn.textContent = orig, 1500);
}

function resetMdx() {
  if (confirm('Restaurer la version initiale ? Tes modifications seront perdues.')) {
    textarea.value = INITIAL_MDX;
    render();
  }
}

render();
</script>
