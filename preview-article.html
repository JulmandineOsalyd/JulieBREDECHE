const INITIAL_MDX = `---
title: "SharePoint ou Power Apps ? La grille de décision pour ne pas se tromper"

*"On voudrait digitaliser notre processus de validation des achats. On a déjà SharePoint, ça suffit non ?"*

La question revient souvent. Et la réponse honnête, c'est : ça dépend.

Pas seulement du formulaire. De l'ensemble : comment les données sont saisies, comment elles sont suivies, comment les équipes les consultent au quotidien.

---

## Ce que SharePoint couvre nativement

SharePoint, c'est bien plus qu'un formulaire. Une liste SharePoint donne accès à trois briques sans rien développer :

- **Formulaire de saisie** : colonnes configurables, types de champs variés (choix, date, personne, nombre)
- **Liste de suivi** : toutes les entrées visibles, filtrables, triables, avec des vues personnalisées par équipe
- **Intégration de flux Power Automate** : lancement de flux Power Automate à la modification d'un élément de liste

C'est inclus dans vos licences Microsoft 365. Seulement du paramétrage, et pas de coût de licence supplémentaire.

> **Pour beaucoup de processus internes simples, SharePoint est la bonne réponse.**

---

## Ce que Power Apps apporte en plus

Power Apps, c'est une application à part entière. On sort du formulaire pour entrer dans une vraie logique applicative.

Ce que Power Apps permet que SharePoint ne fait pas proprement :

- **Formulaire conditionnel** : afficher ou masquer des champs selon les réponses, bloquer la soumission selon des règles métier
- **Navigation multi-écrans** : un écran de saisie, un écran de validation, un écran de consultation, avec une UX pensée pour chaque profil
- **Données multi-sources** : connecter plusieurs listes SharePoint, une base Dataverse, un ERP, un fichier Excel en même temps
- **Dashboard avancé** : galeries filtrables, graphiques dynamiques, indicateurs calculés en temps réel
- **Mobile natif** : une application pensée pour le smartphone, pas un formulaire web adapté à contrecœur

⚠️ Power Apps est inclus dans certaines licences Microsoft 365, mais pas toutes. Dès qu'on utilise Dataverse ou des connecteurs premium, une licence dédiée devient nécessaire.

---

## La grille de décision

| Besoin | SharePoint | Power Apps |
|---|---|---|
| Formulaire simple, champs fixes | ✅ &nbsp; Natif | ❌ &nbsp; Surdimensionné |
| Liste de suivi avec vues filtrées | ✅ &nbsp; Natif | ✅ &nbsp; Possible |
| Dashboard de pilotage basique | ✅ &nbsp; Suffisant | ✅ &nbsp; Plus puissant |
| Champs conditionnels (affichage selon réponse) | ⚠️ &nbsp; Très limité | ✅ &nbsp; Natif |
| Règles de validation métier complexes | ❌ &nbsp; Non | ✅ &nbsp; Natif |
| Navigation multi-écrans par profil | ❌ &nbsp; Non | ✅ &nbsp; Natif |
| Données issues de plusieurs sources | ❌ &nbsp; Difficile | ✅ &nbsp; Conçu pour ça |
| Usage mobile confortable | ⚠️ &nbsp; Passable | ✅ &nbsp; Natif |
| Utilisateurs internes avec licence M365 | ✅ &nbsp; Inclus | ✅ &nbsp; Souvent inclus |
| Accès utilisateurs externes | ✅ &nbsp; Possible | ⚠️ &nbsp; Licence spécifique |

---

## Quand rester sur SharePoint pour éviter des licences supplémentaires

C'est un arbitrage que les décideurs oublient souvent de poser au bon moment.

Trois situations où SharePoint reste le bon choix, même si Power Apps semblerait plus confortable :

- **Tous les utilisateurs sont internes** et le processus est simple : SharePoint couvre le besoin sans surcoût ni surcharge projet
- **Pas d'accès externe prévu** : dès qu'un prestataire ou un client doit accéder à l'application, vérifier les licences avant de choisir Power Apps
- **Besoin ponctuel ou peu critique** : pour un processus utilisé deux fois par an, une liste SharePoint bien configurée est largement suffisante

> **Avant de choisir, vérifiez quelles licences Power Apps sont déjà incluses dans votre contrat Microsoft 365. La réponse change souvent tout.**

---

## Ma conclusion

La vraie question n'est pas "SharePoint ou Power Apps ?". C'est "qu'est-ce que mon processus demande vraiment, de bout en bout ?"

Trois constats qui reviennent en mission :

1. **On sous-estime SharePoint** : une liste bien configurée avec les bonnes vues couvre 80% des besoins de suivi sans aucun développement.
2. **On sur-dimensionne Power Apps** : on lance une application complète pour un besoin qui aurait été couvert en deux heures avec une liste SharePoint.
3. **La grille de décision se pose dès le cadrage** : pas après avoir commencé à développer.`;

const textarea = document.getElementById('mdx');
const preview = document.getElementById('preview');
const stats = document.getElementById('stats');

textarea.value = INITIAL_MDX;

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, s => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[s]));
}

function formatDateFr(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    return d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
  } catch { return iso; }
}

function render() {
  const raw = textarea.value;
  const match = raw.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
  let frontmatter = {};
  let body = raw;
  if (match) {
    try { frontmatter = jsyaml.load(match[1]) || {}; } catch (e) { frontmatter = {}; }
    body = match[2];
  }

  const title = frontmatter.title || 'Sans titre';
  const excerpt = frontmatter.excerpt || '';
  const category = Array.isArray(frontmatter.category)
    ? frontmatter.category.join(' · ')
    : (frontmatter.category || '');
  const date = formatDateFr(frontmatter.date);

  const bodyHtml = marked.parse(body);

  preview.innerHTML = `
    ${category ? `<div class="meta">${escapeHtml(category)}</div>` : ''}
    <h1>${escapeHtml(title)}</h1>
    ${excerpt ? `<div class="excerpt">${escapeHtml(excerpt)}</div>` : ''}
    ${date ? `<div class="date">${escapeHtml(date)}</div>` : ''}
    ${bodyHtml}
  `;

  const words = body.replace(/[#*_>`\-|]/g, ' ').split(/\s+/).filter(w => w.length > 1).length;
  const readTime = Math.ceil(words / 300);
  stats.textContent = `Mots: ${words} • Temps: ${readTime} min`;
}

let debounce;
textarea.addEventListener('input', () => {
  clearTimeout(debounce);
  debounce = setTimeout(render, 150);
});

function copyMdx(e) {
  textarea.select();
  document.execCommand('copy');
  const btn = e.currentTarget;
  const orig = btn.textContent;
  btn.textContent = '✓ Copié !';
  setTimeout(() => btn.textContent = orig, 1500);
}

function resetMdx() {
  if (confirm('Restaurer la version initiale ? Tes modifications seront perdues.')) {
    textarea.value = INITIAL_MDX;
    render();
  }
}

render();
</script>
